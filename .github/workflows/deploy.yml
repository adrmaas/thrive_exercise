name: Deploy

on:
  workflow_dispatch: {}
  push:
    branches:
      - master
    paths:
      - 'app/**'
      - '.github/workflows/deploy.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    needs: [ci]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_DEPLOY_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_DEPLOY_SECRET_ACCESS_KEY }}
          aws-region: us-west-2

      - name: Install SSM Session Manager plugin
        run: |
          curl -sSL "https://s3.amazonaws.com/session-manager-downloads/plugin/latest/ubuntu_64bit/session-manager-plugin.deb" -o /tmp/session-manager-plugin.deb
          sudo dpkg -i /tmp/session-manager-plugin.deb

      - name: Read deploy config from SSM
        id: config
        run: |
          echo "ecr_url=$(aws ssm get-parameter --name /thrive-exercise/deploy/ECR_URL --query Parameter.Value --output text)" >> $GITHUB_OUTPUT
          echo "instance_ip=$(aws ssm get-parameter --name /thrive-exercise/deploy/INSTANCE_ID --query Parameter.Value --output text)" >> $GITHUB_OUTPUT
          echo "secret_key_base=$(aws ssm get-parameter --name /thrive-exercise/SECRET_KEY_BASE --with-decryption --query Parameter.Value --output text)" >> $GITHUB_OUTPUT
          echo "username=$(aws ssm get-parameter --name /thrive-exercise/USERNAME --with-decryption --query Parameter.Value --output text)" >> $GITHUB_OUTPUT
          echo "password=$(aws ssm get-parameter --name /thrive-exercise/PASSWORD --with-decryption --query Parameter.Value --output text)" >> $GITHUB_OUTPUT
          echo "ssh_private_key<<EOF" >> $GITHUB_OUTPUT
          aws ssm get-parameter --name /thrive-exercise/SSH_PRIVATE_KEY --with-decryption --query Parameter.Value --output text >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and Push Docker Image
        env:
          ECR_URL: ${{ steps.config.outputs.ecr_url }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_URL:$IMAGE_TAG -t $ECR_URL:latest -f app/Dockerfile app
          docker push $ECR_URL:$IMAGE_TAG
          docker push $ECR_URL:latest

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true
          working-directory: app

      - name: Deploy with Kamal
        working-directory: app
        env:
          DEPLOY_HOSTS: ${{ steps.config.outputs.instance_ip }}
          DEPLOY_IMAGE: ${{ steps.config.outputs.ecr_url }}
          IMAGE_TAG: ${{ github.sha }}
          SECRET_KEY_BASE: ${{ steps.config.outputs.secret_key_base }}
          USERNAME: ${{ steps.config.outputs.username }}
          PASSWORD: ${{ steps.config.outputs.password }}
          SSH_PRIVATE_KEY: ${{ steps.config.outputs.ssh_private_key }}
        run: bundle exec kamal deploy

  ci:
    uses: ./.github/workflows/ci.yml
