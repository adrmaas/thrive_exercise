name: Deploy

on:
  workflow_dispatch: {}
  push:
    branches:
      - master
    paths:
      - 'app/**'
      - '.github/workflows/deploy.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    needs: [ci]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_DEPLOY_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_DEPLOY_SECRET_ACCESS_KEY }}
          aws-region: us-west-2

      - name: Read deploy config from SSM
        id: config
        run: |
          echo "ecr_url=$(aws ssm get-parameter --name /thrive-exercise/deploy/ECR_URL --query Parameter.Value --output text)" >> $GITHUB_OUTPUT
          echo "instance_ips=$(aws ssm get-parameter --name /thrive-exercise/deploy/INSTANCE_IPS --query Parameter.Value --output text)" >> $GITHUB_OUTPUT

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and Push Docker Image
        env:
          ECR_URL: ${{ steps.config.outputs.ecr_url }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_URL:$IMAGE_TAG -t $ECR_URL:latest -f app/Dockerfile app
          docker push $ECR_URL:$IMAGE_TAG
          docker push $ECR_URL:latest

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true
          working-directory: app

      - name: Deploy with Kamal
        working-directory: app
        env:
          DEPLOY_HOSTS: ${{ steps.config.outputs.instance_ips }}
          DEPLOY_IMAGE: ${{ steps.config.outputs.ecr_url }}
          IMAGE_TAG: ${{ github.sha }}
          KAMAL_REGISTRY_PASSWORD: ${{ steps.ecr-login.outputs.docker_password_071919116017_dkr_ecr_us_west_2_amazonaws_com }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          echo "$SSH_PRIVATE_KEY" > /tmp/deploy_key && chmod 600 /tmp/deploy_key
          eval $(ssh-agent)
          ssh-add /tmp/deploy_key
          rm /tmp/deploy_key
          bundle exec kamal deploy

  ci:
    uses: ./.github/workflows/ci.yml
